seq: 1
body:
  text: 毛詩序義夫風雅者體同而由我化物則謂之風物由我正則謂之雅考之禮教其歸不殊也書鈔引周續之解詩黃鳥于飛集于灌木毛傳灌木叢木也叢狙會反顏氏家訓曰毛傳乃爾雅之文故李巡注曰木叢生曰灌爾雅末章又云木族生為灌族亦叢聚也所以江南詩古本皆為藂聚之藂而古叢字似㝡字近世儒生因改為㝡解云木之㝡高長者案眾家爾雅及解詩無言此者唯周續之毛詩注音為徂會反劉昌宗詩注音為在公反又祖會反皆為穿鑿失爾雅訓也維鵲有巢鄭箋鵲之有巢冬至加功至春乃成加音架匡謬正俗曰鄭箋是言始起冬至加功力作巢蓋直語耳而劉昌宗周續之等音加為架若以搆架為義則不應為架功也夾其皇澗遡其過澗毛傳山夾水曰澗夾音頰匡謬正俗曰詩傳引爾雅正文言兩山夾水名之為澗居然可想而劉周之徒又音夾為頰於義無取亦為專輒或問曰斬縗終三年乎答曰不也卒哭而服齊縗又問若不終三年則喪服禮何故云髽又云三年之喪若斬則是居情理之極所謂致喪者也焉得卒哭而奪情答曰但尋名教者宜求其本本正則條目自明聖王雖總企及俯就以為之制要以滅性為深憂是以節哀順變每受以輕也孟氏問曰嗣子今為孟使君持重光祿喪庭便無復主位於禮云何周續之答曰禮無曉然之文然意謂嗣子宜兼持重正位之喪豈可嗣三年正主耶又問曰若嗣子兼持重者光祿喪次親有廬耶又答曰禮之倚廬在東牆下蓋是寢苦枕凷之處非接賓位也謂寢息之所宜在親之殯宮於光祿喪庭若賓客饋奠凡是有事然後之喪所巳則還廬次然今代皆以廬為接賓之位位則二處從禮之變亦宜兩設也又問葬奠之禮何先何後又答曰父母之喪偕其葬也先輕而後重其虞也先重而後輕其葬服斬縗以例而推光祿葬及奠虞皆宜先於情則祖輕於尊則祖重
